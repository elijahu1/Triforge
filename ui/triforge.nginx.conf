server {
    listen 80;
    server_name chat.elijahu.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chat.elijahu.me;
    
    ssl_certificate /etc/letsencrypt/live/chat.elijahu.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.elijahu.me/privkey.pem;
    
    root /home/ubuntu/Triforge/ui/public;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
    
    location /invoke {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
